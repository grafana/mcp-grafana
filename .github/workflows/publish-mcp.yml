name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read
  packages: write  # Required for publishing Docker images

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Run tests
        run: make test-unit

      - name: Build binary
        run: make build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # These secrets need to be configured in GitHub repository settings
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            grafana/mcp-grafana:${{ steps.version.outputs.VERSION }}
            grafana/mcp-grafana:latest
          platforms: linux/amd64,linux/arm64

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.2.3/mcp-publisher_1.2.3_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Update server.json with Docker image
        run: |
          # Update the server.json with the correct Docker image reference
          jq --arg version "${{ steps.version.outputs.VERSION }}" \
             --arg image "grafana/mcp-grafana:${{ steps.version.outputs.VERSION }}" \
             '.packages[0].version = $version | 
              .packages[0].identifier = $image |
              .version = $version' server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Login to MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
